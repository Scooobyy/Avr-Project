<!DOCTYPE html>
<html>
<head>
  <title>AR Furniture App</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; font-family: sans-serif; }

    button {
      position: absolute;
      bottom: 20px;
      padding: 10px 15px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      border-radius: 10px;
      z-index: 10;
    }

    #rotateBtn { left: 20px; }
    #chairBtn { left: 110px; }
    #tableBtn { left: 200px; }
  </style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.mind;"
  color-space="sRGB"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
>

  <!-- Camera -->
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- Target -->
  <a-entity mindar-image-target="targetIndex: 0">


      <!-- DEBUG PLANE -->
  <a-plane color="green" width="1" height="1"></a-plane>
    <!-- 3D Furniture -->
    <a-entity 
      id="furniture"
      gltf-model="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Chair/glTF/Chair.gltf"
      scale="0.5 0.5 0.5"
      position="0 0 0">
    </a-entity>

  </a-entity>

</a-scene>

<!-- Buttons -->
<button id="rotateBtn" onclick="rotate()">Rotate</button>
<button id="chairBtn" onclick="loadChair()">Chair</button>
<button id="tableBtn" onclick="loadTable()">Table</button>

<script>
function rotate() {
  let obj = document.querySelector("#furniture");
  let rot = obj.getAttribute("rotation");

  obj.setAttribute("rotation", {
    x: rot.x,
    y: rot.y + 45,
    z: rot.z
  });
}

function loadChair() {
  document.querySelector("#furniture").setAttribute(
    "gltf-model",
    "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Chair/glTF/Chair.gltf"
  );
}

function loadTable() {
  document.querySelector("#furniture").setAttribute(
    "gltf-model",
    "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Table/glTF/Table.gltf"
  );
}
</script>

</body>
</html>
