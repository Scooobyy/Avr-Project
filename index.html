<!DOCTYPE html>
<html>
<head>
  <title>AR Furniture App</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; }
    button {
      position: absolute;
      bottom: 20px;
      left: 20px;
      padding: 10px;
      background: black;
      color: white;
      border-radius: 5px;
      z-index: 10;
    }
  </style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.mind;"
  color-space="sRGB"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- 3D Object -->
    <a-box id="furniture" position="0 0 0" color="blue"></a-box>

  </a-entity>

</a-scene>

<button onclick="rotate()">Rotate</button>

<script>
function rotate() {
  let obj = document.querySelector("#furniture");
  let rot = obj.getAttribute("rotation");
  obj.setAttribute("rotation", {
    x: rot.x,
    y: rot.y + 45,
    z: rot.z
  });
}
</script>

</body>
</html>
