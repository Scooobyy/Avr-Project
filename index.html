<!DOCTYPE html>
<html>
<head>
  <title>AR Furniture App</title>

  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.3.2/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    button {
      position: absolute;
      bottom: 20px;
      left: 20px;
      padding: 10px 15px;
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
      z-index: 10;
    }
  </style>
</head>

<body>

<!-- AR Scene -->
<a-scene 
  embedded 
  arjs="sourceType: webcam; debugUIEnabled: false;"
  vr-mode-ui="enabled: false">

  <!-- Marker -->
  <a-marker preset="hiro">

    <!-- Furniture (box) -->
    <a-box 
      id="furniture"
      position="0 0.5 0"
      color="red"
      depth="1"
      height="0.5"
      width="1">
    </a-box>

  </a-marker>

  <!-- Camera (FIXED) -->
  <a-entity camera></a-entity>

</a-scene>

<!-- Rotate Button -->
<button onclick="rotate()">Rotate</button>

<script>
  function rotate() {
    let obj = document.querySelector("#furniture");
    let rotation = obj.getAttribute("rotation");

    obj.setAttribute("rotation", {
      x: rotation.x,
      y: rotation.y + 45,
      z: rotation.z
    });
  }
</script>

</body>
</html>
